name: lifecycle-platform CI

on:
  push:
    paths:
      - "lifecycle-platform/**"
      - ".github/workflows/lifecycle-platform-ci.yml"
  pull_request:
    paths:
      - "lifecycle-platform/**"
      - ".github/workflows/lifecycle-platform-ci.yml"

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    defaults:
      run:
        working-directory: lifecycle-platform
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: lifecycle-platform/package-lock.json

      - name: Install and CI
        run: |
          npm ci
          npm run ci
