name: lifecycle-platform CI

on:
  push:
    paths:
      - "lifecycle-platform/**"
      - ".github/workflows/lifecycle-platform-ci.yml"
  pull_request:
    paths:
      - "lifecycle-platform/**"
      - ".github/workflows/lifecycle-platform-ci.yml"

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    defaults:
      run:
        working-directory: lifecycle-platform
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: lifecycle-platform/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Lifecycle CI pipeline
        run: npm run ci

      - name: Lifecycle tests
        run: npm test

      - name: Lifecycle pre-release dry run
        run: npm run pre-release:fast

      - name: Route smoke (ephemeral next start)
        env:
          # Dedicated port avoids clashes with local defaults / other jobs.
          SMOKE_PORT: "3099"
        run: npm run ci-route-smoke

      - name: Duration check
        run: |
          echo "Pipeline kept in job timeout budget (<20 min)."
